<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Halftone Wave Hero</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-container">
    
    <!-- Hero Section -->
    <section class="hero-section" id="hero">
      <canvas id="halftone-canvas"></canvas>
      <div class="hero-content">
        <h1 class="hero-title">Experience The Future</h1>
        <p class="hero-subtitle">Interactive Halftone Wave Animation</p>
        <button class="cta-button">Get Started</button>
      </div>
    </section>

    <!-- Section 2: Cuộn xuống đây để trigger đổi theme -->
    <section class="content-section" id="section2">
      <div class="content-wrapper">
        <h2>Dark Theme Activated</h2>
        <p>Giao diện đã chuyển từ sáng (Light) sang tối (Dark) một cách mượt mà thông qua CSS Variables khi bạn cuộn qua Hero Section.</p>
      </div>
    </section>

    <!-- Section phụ để tạo khoảng trống scroll thêm -->
    <section class="content-section">
      <div class="content-wrapper">
        <h2>More Content</h2>
        <p>Tiếp tục cuộn... Cuộn ngược lên để quay về Light Theme.</p>
      </div>
    </section>

  </main>

  <script src="main.js"></script>
</body>
</html>
